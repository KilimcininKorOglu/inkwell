services:
  inkwell:
    build: .
    container_name: inkwell_app
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      FETCH_INTERVAL: ${FETCH_INTERVAL:-300}
      DB_HOST: db
      DB_NAME: ${DB_NAME:-dmarc}
      DB_USER: ${DB_USER:-dmarcuser}
      DB_PASSWORD: ${DB_PASSWORD:-dmarcpass}
      PORT: "8080"
      ADMIN_USER: ${ADMIN_USER:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  db:
    image: mariadb:10.11
    container_name: inkwell_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DB_NAME:-dmarc}
      MYSQL_USER: ${DB_USER:-dmarcuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-dmarcpass}
    volumes:
      - ./docker-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
