<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inkwell</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body>
    <header class="gmail-topbar">
        <div class="topbar-left">
            <a href="/" class="topbar-logo">
                <span class="logo-icon">🛡️</span>
                <span class="logo-text">Inkwell</span>
            </a>
        </div>
        <div class="topbar-center" x-data="{ showFilters: false }">
            <form id="search-form" action="/" method="GET">
                <div class="topbar-search-bar">
                    <span class="material-icons-outlined search-icon">search</span>
                    <input type="text" name="q" class="search-input"
                           placeholder="Search reports..."
                           value="{{.SearchQuery}}"
                           hx-get="/dashboard/content"
                           hx-target="#main-content"
                           hx-trigger="keyup changed delay:500ms"
                           hx-include="#search-form">
                    <button type="button" class="filter-toggle" @click="showFilters = !showFilters" title="Advanced filters">
                        <span class="material-icons-outlined" style="font-size: 1.1rem;">tune</span>
                    </button>
                </div>
                <div class="search-dropdown" x-show="showFilters" @click.outside="showFilters = false" x-cloak>
                    {{template "sidebar" .Sidebar}}
                    <div class="search-actions">
                        <button type="button" class="btn btn-secondary" @click="showFilters = false"
                                hx-get="/dashboard/content"
                                hx-target="#main-content"
                                hx-include="#search-form">
                            Apply
                        </button>
                        <a href="/" class="btn btn-secondary">Reset</a>
                    </div>
                </div>
            </form>
        </div>
        <div class="topbar-right"></div>
    </header>

    <div class="app-layout">
        <aside class="sidebar">
            <nav class="sidebar-nav-main">
                <a href="/" class="nav-item active">
                    <span class="material-icons-outlined">inbox</span>
                    <span>Reports</span>
                </a>
                <a href="/domains" class="nav-item">
                    <span class="material-icons-outlined">dns</span>
                    <span>Domains</span>
                </a>
            </nav>
        </aside>

        <div class="main-content" id="main-content">
            {{template "content" .}}
        </div>
    </div>
</body>
</html>
