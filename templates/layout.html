<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inkwell</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body>
    <header class="gmail-topbar">
        <div class="topbar-left">
            <div class="topbar-logo">
                <span class="logo-icon">🛡️</span>
                <span class="logo-text">Inkwell</span>
            </div>
        </div>
        <form class="topbar-search" action="/" method="GET">
            <span class="material-icons-outlined search-icon">search</span>
            <input type="text" name="q" class="search-input" placeholder="Search reports by domain, organization, or IP..." value="{{.SearchQuery}}">
        </form>
        <div class="topbar-right"></div>
    </header>

    <div class="app-layout">
        <aside class="sidebar">
            <nav class="sidebar-nav-main">
                <a href="/" class="nav-item active">
                    <span class="material-icons-outlined">dashboard</span>
                    <span>Dashboard</span>
                </a>
                <a href="/domains" class="nav-item">
                    <span class="material-icons-outlined">dns</span>
                    <span>Domains</span>
                </a>
            </nav>
            <div class="sidebar-divider"></div>
            <div class="sidebar-filters">
                {{template "sidebar" .Sidebar}}
            </div>
        </aside>

        <div class="main-content" id="main-content">
            {{template "content" .}}
        </div>
    </div>
</body>
</html>
