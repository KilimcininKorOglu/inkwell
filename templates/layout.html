<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inkwell</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='1em' font-size='80' fill='%2322c55e'>&#x26A1;</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500;600&family=Material+Icons+Outlined&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body>
    <header class="gmail-topbar">
        <div class="topbar-left">
            <a href="/" class="topbar-logo">
                <span class="logo-text">inkwell</span>
            </a>
        </div>
        <div class="topbar-center" x-data="{ showFilters: false }">
            <form id="search-form" action="/" method="GET">
                <div class="topbar-search-bar">
                    <span class="material-icons-outlined search-icon">search</span>
                    <input type="text" name="q" class="search-input"
                           placeholder="search reports"
                           value="{{.SearchQuery}}"
                           hx-get="/dashboard/content"
                           hx-target="#main-content"
                           hx-trigger="keyup changed delay:500ms"
                           hx-include="#search-form">
                    <button type="button" class="filter-toggle" @click="showFilters = !showFilters" title="Filters">
                        <span class="material-icons-outlined" style="font-size: 16px;">tune</span>
                    </button>
                </div>
                <div class="search-dropdown" x-show="showFilters" @click.outside="showFilters = false" x-cloak>
                    {{template "sidebar" .Sidebar}}
                    <div class="search-actions">
                        <button type="button" class="btn btn-secondary" @click="showFilters = false"
                                hx-get="/dashboard/content"
                                hx-target="#main-content"
                                hx-include="#search-form">
                            Apply
                        </button>
                        <a href="/" class="btn btn-secondary">Reset</a>
                    </div>
                </div>
            </form>
        </div>
        <div class="topbar-right">
            <form method="POST" action="/logout" style="display:inline;">
                <button type="submit" class="logout-btn" title="Logout">
                    <span class="material-icons-outlined" style="font-size: 16px;">logout</span>
                </button>
            </form>
        </div>
    </header>

    <div class="app-layout">
        <aside class="sidebar">
            <a href="/" class="nav-item{{if not .SelectedDomain}} active{{end}}"
               hx-get="/" hx-target="#main-content" hx-push-url="true">
                <span class="material-icons-outlined">inbox</span>
                <span>Inbox</span>
            </a>
            {{range .AllDomains}}
            <a href="/?domain={{.}}" class="nav-item{{if eq . $.SelectedDomain}} active{{end}}"
               hx-get="/dashboard/content?domain={{.}}" hx-target="#main-content" hx-push-url="true">
                <span class="material-icons-outlined">label</span>
                <span>{{.}}</span>
            </a>
            {{end}}
        </aside>

        <div class="main-content" id="main-content">
            {{template "content" .}}
        </div>
    </div>
</body>
</html>
