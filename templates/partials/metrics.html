{{define "metrics"}}
<div class="metrics-row">
    <div class="metric-card">
        <span class="metric-label">Total IPs Evaluated</span>
        <span class="metric-value">{{.TotalIPs}}</span>
    </div>
    <div class="metric-card">
        <span class="metric-label">Total Email Message Volume</span>
        <span class="metric-value">{{.TotalVolume}}</span>
    </div>
    <div class="metric-card">
        <span class="metric-label">Overall Authenticated Pass Rate</span>
        <span class="metric-value">{{.PassRateStr}}</span>
    </div>
</div>
{{end}}
