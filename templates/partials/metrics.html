{{define "metrics"}}
<div class="metric-bar">
    <span class="metric-chip">
        <span class="material-icons-outlined" style="color: var(--accent-blue);">language</span>
        <span class="metric-chip-value">{{.TotalIPs}}</span> IPs
    </span>
    <span class="metric-chip">
        <span class="material-icons-outlined" style="color: var(--accent-purple);">mail</span>
        <span class="metric-chip-value">{{.TotalVolume}}</span> emails
    </span>
    <span class="metric-chip">
        <span class="material-icons-outlined" style="color: var(--accent-green);">verified_user</span>
        <span class="metric-chip-value">{{.PassRateStr}}</span> pass
    </span>
</div>
{{end}}
