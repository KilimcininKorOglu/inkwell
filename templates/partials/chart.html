{{define "chart"}}
<div class="chart-container">
    <h3>Global Email Volume over Time</h3>
    <canvas id="volumeChart" height="100"></canvas>
    <script>
        (function() {
            var existingChart = Chart.getChart('volumeChart');
            if (existingChart) existingChart.destroy();

            var chartData = {{toJSON .}};
            var ctx = document.getElementById('volumeChart').getContext('2d');

            var colors = ['#58a6ff', '#f0883e', '#f85149', '#3fb950', '#bc8cff', '#d29922'];

            var datasets = [];
            for (var i = 0; i < chartData.Datasets.length; i++) {
                var ds = chartData.Datasets[i];
                datasets.push({
                    label: ds.Label,
                    data: ds.Data,
                    fill: !chartData.UseBarChart,
                    backgroundColor: colors[i % colors.length] + (chartData.UseBarChart ? 'cc' : '33'),
                    borderColor: colors[i % colors.length],
                    borderWidth: chartData.UseBarChart ? 0 : 2,
                    tension: 0.2,
                    pointRadius: chartData.UseBarChart ? 0 : 3
                });
            }

            new Chart(ctx, {
                type: chartData.UseBarChart ? 'bar' : 'line',
                data: {
                    labels: chartData.Labels,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    interaction: { intersect: false, mode: 'index' },
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: { color: '#e6edf3', font: { size: 12 } }
                        }
                    },
                    scales: {
                        x: {
                            title: { display: true, text: 'Date', color: '#8b949e' },
                            ticks: { color: '#8b949e' },
                            grid: { color: '#21262d' }
                        },
                        y: {
                            title: { display: true, text: 'Email Count', color: '#8b949e' },
                            ticks: { color: '#8b949e' },
                            grid: { color: '#21262d' },
                            beginAtZero: true,
                            stacked: !chartData.UseBarChart
                        }
                    }
                }
            });
        })();
    </script>
</div>
{{end}}
