{{define "content"}}
{{if not .HasData}}
    {{template "empty" .}}
{{else if not .Metrics}}
    <p class="warning-message">
        <span class="material-icons-outlined" style="font-size: 1rem; vertical-align: -3px;">warning</span>
        No records match the current filters.
    </p>
{{else}}
    {{template "metrics" .Metrics}}
    {{template "reportsTable" .}}
{{end}}
{{end}}
