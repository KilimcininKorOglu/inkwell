{{define "reportsTable"}}
<div class="mail-list">
    {{range .Reports}}
    <div class="mail-row"
         hx-get="/dashboard/detail/{{.DBID}}"
         hx-target="#detail-panel"
         hx-swap="innerHTML"
         onclick="document.querySelectorAll('.mail-row').forEach(r => r.classList.remove('selected')); this.classList.add('selected');">
        <div class="mail-checkbox"><input type="checkbox" onclick="event.stopPropagation();"></div>
        <div class="mail-sender">{{.Domain}}</div>
        <div class="mail-org">{{.Organization}}</div>
        <div class="mail-snippet">{{.ReportID}}</div>
        <div class="mail-badge">{{.Messages}}</div>
        <div class="mail-date">{{.StartDate}}</div>
    </div>
    {{end}}
</div>
<div id="detail-panel"></div>
{{end}}
