{{define "loginPageLayout"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Inkwell</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500;600&family=Material+Icons+Outlined&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <span class="login-logo-text">inkwell</span>
            </div>
            <div class="login-subtitle">DMARC Report Analyzer</div>

            {{if .Error}}
            <div class="login-error">
                <span class="material-icons-outlined" style="font-size: 16px;">error</span>
                {{.Error}}
            </div>
            {{end}}

            <form method="POST" action="/login" class="login-form">
                <input type="hidden" name="_csrf" value="{{.CSRFToken}}">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input class="form-input" type="text" id="username" name="username"
                           value="{{.Username}}" placeholder="admin" autocomplete="username" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-input" type="password" id="password" name="password"
                           placeholder="Enter password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn btn-primary login-btn">
                    Sign in
                </button>
            </form>
        </div>
    </div>
</body>
</html>
{{end}}
